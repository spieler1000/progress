<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Stundenwechsel</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 600px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

.label {
    margin-bottom: 12px;
    font-size: 18px;
}

.bar-container {
    width: 100%;
    height: 35px;
    background: #333;
    border-radius: 8px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff88, #00ccff);
    transition: width 0.1s linear;
}
</style>
</head>

<body>

<div class="container">
    <h1>Zeit bis zum nächsten Stundenwechsel</h1>
    <div class="label" id="text"></div>
    <div class="bar-container">
        <div class="bar" id="bar"></div>
    </div>
</div>

<script>

const wechselZeiten = [
    "07:55",
    "08:40",
    "09:25",
    "10:30",
    "11:15",
    "12:20",
    "13:05"
];

function toToday(timeStr) {
    const now = new Date();
    const [h, m] = timeStr.split(":");
    const d = new Date(now);
    d.setHours(parseInt(h), parseInt(m), 0, 0);
    return d;
}

function update() {
    const now = new Date();
    const text = document.getElementById("text");
    const bar = document.getElementById("bar");

    const times = wechselZeiten.map(t => toToday(t));

    let previous = null;
    let next = null;

    for (let i = 0; i < times.length; i++) {
        if (times[i] > now) {
            next = times[i];
            previous = times[i - 1] || null;
            break;
        }
    }

    if (!next) {
        text.textContent = "Heute kein weiterer Stundenwechsel";
        bar.style.width = "0%";
        return;
    }

    if (!previous) {
        // Vor dem ersten Wechsel
        const remaining = next - now;
        const seconds = Math.floor(remaining / 1000);
        const min = Math.floor(seconds / 60);
        const sec = seconds % 60;

        text.textContent =
            "Erster Stundenwechsel in " +
            min + " Minuten und " +
            sec + " Sekunden";

        bar.style.width = "0%";
        return;
    }

    const total = next - previous;
    const passed = now - previous;
    const remaining = next - now;

    const percent = (passed / total) * 100;
    bar.style.width = percent + "%";

    const seconds = Math.floor(remaining / 1000);
    const min = Math.floor(seconds / 60);
    const sec = seconds % 60;

    text.textContent =
        "Nächster Stundenwechsel in " +
        min + " Minuten und " +
        sec + " Sekunden";
}

setInterval(update, 100);
update();

</script>

</body>
</html>
