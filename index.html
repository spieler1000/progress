<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-black text-white relative flex items-center justify-center p-6 overflow-y-auto">
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(59,130,246,0.25),transparent_40%),radial-gradient(circle_at_bottom,rgba(168,85,247,0.2),transparent_40%)]"></div>

  <div class="relative z-10 w-full max-w-3xl rounded-3xl border border-white/10 bg-white/5 backdrop-blur-2xl shadow-2xl p-8 md:p-12 overflow-hidden">
    <div class="flex items-center justify-between mb-8 gap-4 flex-wrap">
      <div class="flex gap-2 bg-black/30 border border-white/10 rounded-2xl p-2">
        <button id="normalBtn" class="px-5 py-2 rounded-xl text-sm font-semibold bg-cyan-400 text-black transition-all duration-500 ease-out">
          Normal
        </button>

        <button id="schoolBtn" class="px-5 py-2 rounded-xl text-sm font-semibold text-zinc-400 transition-all duration-500 ease-out">
          Schule
        </button>
      </div>

      <p class="text-zinc-500 text-sm">Zeit Dashboard</p>
    </div>

    <div class="flex flex-col gap-2 mb-10">
      <p class="uppercase tracking-[0.3em] text-zinc-400 text-xs">
        Live Time Dashboard
      </p>

      <h1 id="clock" class="text-5xl md:text-7xl font-black tracking-tight bg-gradient-to-r from-white via-cyan-200 to-purple-300 bg-clip-text text-transparent">
        00:00:00
      </h1>

      <p id="date" class="text-zinc-400 text-sm md:text-base"></p>
    </div>

    <div id="schoolView" class="hidden mb-10 rounded-3xl border border-cyan-500/20 bg-cyan-500/5 p-6 backdrop-blur-xl">
      <div class="flex items-center justify-between gap-4 flex-wrap mb-6">
        <div>
          <p class="text-cyan-300 uppercase tracking-[0.2em] text-xs mb-2">
            Schulübersicht
          </p>

          <h2 id="remainingLessons" class="text-3xl font-black"></h2>
        </div>

        <div class="text-right">
          <p class="text-zinc-400 text-sm">Nächstes Event</p>
          <h3 id="nextEventTime" class="text-2xl font-bold"></h3>
          <p id="nextEventLabel" class="text-zinc-500 text-sm"></p>
        </div>
      </div>

      <div class="mb-4">
        <div class="flex justify-between text-sm text-zinc-300 mb-2">
          <span>Schultag vorbei</span>
          <span id="schoolProgressText"></span>
        </div>

        <div class="h-5 overflow-hidden rounded-full bg-zinc-900 border border-zinc-700">
          <div id="schoolProgressBar" class="h-full rounded-full bg-gradient-to-r from-emerald-400 via-cyan-400 to-blue-500 transition-all duration-[1500ms] ease-out"></div>
        </div>
      </div>

      <div class="mt-6 mb-6">
        <div class="flex items-center justify-between text-sm text-zinc-300 mb-2">
          <span id="currentPhaseLabel">Aktuelle Phase</span>
          <span id="phaseRemaining"></span>
        </div>

        <div class="h-4 overflow-hidden rounded-full bg-zinc-900 border border-zinc-700">
          <div id="phaseProgressBar" class="h-full rounded-full bg-gradient-to-r from-purple-400 via-pink-400 to-cyan-400 transition-all duration-1000 ease-out" style="width:0%"></div>
        </div>
      </div>

      <div id="scheduleList" class="mt-6 rounded-2xl border border-white/10 bg-black/20 overflow-hidden"></div>
    </div>

    <div id="normalView" class="grid gap-6"></div>

    <div class="mt-10 grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
        <p class="text-zinc-400 text-xs uppercase">Sekunden</p>
        <h2 id="secondsValue" class="text-3xl font-bold mt-2"></h2>
      </div>

      <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
        <p class="text-zinc-400 text-xs uppercase">Minuten</p>
        <h2 id="minutesValue" class="text-3xl font-bold mt-2"></h2>
      </div>

      <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
        <p class="text-zinc-400 text-xs uppercase">Stunden</p>
        <h2 id="hoursValue" class="text-3xl font-bold mt-2"></h2>
      </div>

      <div class="rounded-2xl bg-white/5 border border-white/10 p-4">
        <p class="text-zinc-400 text-xs uppercase">Tag der Woche</p>
        <h2 id="dayValue" class="text-3xl font-bold mt-2"></h2>
      </div>
    </div>
  </div>

  <script>
    const schoolSchedule = [
      { label: "1. Stunde", time: "07:55" },
      { label: "2. Stunde", time: "08:40" },
      { label: "1. Pause", time: "09:25" },
      { label: "3. Stunde", time: "09:45" },
      { label: "4. Stunde", time: "10:30" },
      { label: "2. Pause", time: "11:15" },
      { label: "5. Stunde", time: "11:35" },
      { label: "6. Stunde", time: "12:20" },
      { label: "Schulende", time: "13:05" },
    ];

    const thursdayExtraSchedule = [
      { label: "Mittagspause", time: "13:05" },
      { label: "8. Stunde", time: "13:50" },
      { label: "Schulende", time: "14:35" },
    ];

    let mode = "normal";

    const normalBtn = document.getElementById("normalBtn");
    const schoolBtn = document.getElementById("schoolBtn");
    const normalView = document.getElementById("normalView");
    const schoolView = document.getElementById("schoolView");

    function switchMode(newMode) {
      mode = newMode;

      if (mode === "normal") {
        normalView.classList.remove("hidden");
        schoolView.classList.add("hidden");

        normalBtn.className = "px-5 py-2 rounded-xl text-sm font-semibold bg-cyan-400 text-black transition-all duration-500 ease-out";
        schoolBtn.className = "px-5 py-2 rounded-xl text-sm font-semibold text-zinc-400 transition-all duration-500 ease-out";
      } else {
        normalView.classList.add("hidden");
        schoolView.classList.remove("hidden");

        schoolBtn.className = "px-5 py-2 rounded-xl text-sm font-semibold bg-purple-400 text-black transition-all duration-500 ease-out";
        normalBtn.className = "px-5 py-2 rounded-xl text-sm font-semibold text-zinc-400 transition-all duration-500 ease-out";
      }
    }

    normalBtn.onclick = () => switchMode("normal");
    schoolBtn.onclick = () => switchMode("school");

    

    function createProgressBar(label, progress, remaining) {
      return `
        <div class="space-y-2">
          <div class="flex items-center justify-between text-sm text-zinc-300">
            <span>${label}</span>
            <span>${remaining}</span>
          </div>

          <div class="h-4 w-full overflow-hidden rounded-full bg-zinc-800 border border-zinc-700">
            <div class="h-full rounded-full bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-500 transition-all duration-500 ease-out duration-1000 ease-out" style="width:${progress}%"></div>
          </div>
        </div>
      `;
    }

    function updateDashboard() {
      const now = new Date();

      const isThursday = now.getDay() === 4;

      const activeSchedule = isThursday
        ? [...schoolSchedule.slice(0, -1), ...thursdayExtraSchedule]
        : schoolSchedule;

      const seconds = now.getSeconds();
      const minutes = now.getMinutes();
      const hours = now.getHours();
      const day = now.getDay() === 0 ? 7 : now.getDay();
      const date = now.getDate();
      const month = now.getMonth() + 1;

      const format = (v) => v.toString().padStart(2, "0");

      document.getElementById("clock").textContent = `${format(hours)}:${format(minutes)}:${format(seconds)}`;

      document.getElementById("date").textContent = now.toLocaleDateString("de-DE", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
      });

      document.getElementById("secondsValue").textContent = seconds;
      document.getElementById("minutesValue").textContent = minutes;
      document.getElementById("hoursValue").textContent = hours;
      document.getElementById("dayValue").textContent = day;

      const secondProgress = (seconds / 60) * 100;
      const minuteProgress = ((minutes * 60 + seconds) / 3600) * 100;
      const hourProgress = ((hours * 3600 + minutes * 60 + seconds) / 86400) * 100;
      const weekProgress = (((day - 1) * 86400 + hours * 3600 + minutes * 60 + seconds) / (7 * 86400)) * 100;

      const daysInMonth = new Date(now.getFullYear(), month, 0).getDate();
      const monthProgress = ((date - 1 + hourProgress / 100) / daysInMonth) * 100;

      const yearStart = new Date(now.getFullYear(), 0, 1);
      const yearEnd = new Date(now.getFullYear() + 1, 0, 1);
      const yearProgress = ((now - yearStart) / (yearEnd - yearStart)) * 100;

      normalView.innerHTML = `
        ${createProgressBar("Minute vorbei", secondProgress, `${59 - seconds}s ${1000 - now.getMilliseconds()}ms übrig`)}
        ${createProgressBar("Stunde vorbei", minuteProgress, `${59 - minutes}min ${59 - seconds}s übrig`)}
        ${createProgressBar("Tag vorbei", hourProgress, `${23 - hours}h ${59 - minutes}min übrig`)}
        ${createProgressBar("Woche vorbei", weekProgress, `${7 - day} Tage ${23 - hours}h übrig`)}
        ${createProgressBar("Monat vorbei", monthProgress, `${daysInMonth - date} Tage ${23 - hours}h übrig`)}
        ${createProgressBar("Jahr vorbei", yearProgress, `${(100 - yearProgress).toFixed(3)}% übrig`)}
      `;

      const nowInMinutes = hours * 60 + minutes + seconds / 60;

      const parsedSchedule = activeSchedule.map((entry) => {
        const [h, m] = entry.time.split(":").map(Number);

        return {
          ...entry,
          minutes: h * 60 + m,
        };
      });

      const nextEvent = parsedSchedule.find((e) => e.minutes > nowInMinutes);

      const totalLessons = 6;

      const passedLessons =
        nowInMinutes >= 13 * 60 + 5
          ? totalLessons
          : nowInMinutes >= 12 * 60 + 20
          ? 5
          : nowInMinutes >= 11 * 60 + 35
          ? 4
          : nowInMinutes >= 10 * 60 + 30
          ? 3
          : nowInMinutes >= 9 * 60 + 45
          ? 2
          : nowInMinutes >= 8 * 60 + 40
          ? 1
          : 0;

      document.getElementById("remainingLessons").textContent = `${totalLessons - passedLessons} Schulstunden übrig`;

      document.getElementById("nextEventTime").textContent = nextEvent ? nextEvent.time : "Vorbei";
      document.getElementById("nextEventLabel").textContent = nextEvent ? nextEvent.label : "Schule beendet";

      const schoolStart = parsedSchedule[0].minutes;
      const schoolEnd = parsedSchedule[parsedSchedule.length - 1].minutes;

      const schoolProgress =
        nowInMinutes < schoolStart
          ? 0
          : nowInMinutes > schoolEnd
          ? 100
          : ((nowInMinutes - schoolStart) / (schoolEnd - schoolStart)) * 100;

      document.getElementById("schoolProgressBar").style.width = `${schoolProgress}%`;

      document.getElementById("schoolProgressText").textContent = nextEvent
        ? `${Math.floor(nextEvent.minutes - nowInMinutes)}min bis ${nextEvent.label}`
        : "Fertig";

      let currentIndex = 0;

      for (let i = 0; i < parsedSchedule.length - 1; i++) {
        if (
          nowInMinutes >= parsedSchedule[i].minutes &&
          nowInMinutes < parsedSchedule[i + 1].minutes
        ) {
          currentIndex = i;
          break;
        }
      }

      const currentPhase = parsedSchedule[currentIndex];
      const nextPhase = parsedSchedule[currentIndex + 1];

      let phaseProgress = 100;
      let phaseRemaining = "Fertig";

      if (currentPhase && nextPhase) {
        const duration = nextPhase.minutes - currentPhase.minutes;
        const passed = nowInMinutes - currentPhase.minutes;

        phaseProgress = Math.max(0, Math.min(100, (passed / duration) * 100));

        phaseRemaining = `${Math.floor(nextPhase.minutes - nowInMinutes)}min bis ${nextPhase.label}`;
      }

      document.getElementById("currentPhaseLabel").textContent = currentPhase
        ? currentPhase.label
        : "Keine aktive Phase";

      document.getElementById("phaseRemaining").textContent = phaseRemaining;

      document.getElementById("phaseProgressBar").style.width = `${phaseProgress}%`;

      document.getElementById("scheduleList").innerHTML = parsedSchedule.map((entry, index) => {
        const active =
          nowInMinutes >= entry.minutes &&
          (!parsedSchedule[index + 1] || nowInMinutes < parsedSchedule[index + 1].minutes);

        return `
          <div class="flex items-center justify-between px-4 py-3 border-b border-white/5 ${active ? "bg-cyan-400/10" : ""}">
            <p class="text-sm font-medium">${entry.label}</p>
            <p class="text-base font-bold">${entry.time}</p>
          </div>
        `;
      }).join("");
    }

    updateDashboard();
    setInterval(updateDashboard, 1000);
  </script>
</body>
</html>
