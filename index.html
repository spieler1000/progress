<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Zeitübersicht</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 600px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
}

.section {
    margin-bottom: 35px;
}

.label {
    margin-bottom: 12px;
    font-size: 18px;
}

.bar-container {
    width: 100%;
    height: 35px;
    background: #333;
    border-radius: 8px;
    overflow: hidden;
}

.bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff88, #00ccff);
    transition: width 0.1s linear;
}
</style>
</head>

<body>

<div class="container">
    <h1>Zeit-Übersicht</h1>

    <!-- Stundenwechsel -->
    <div class="section">
        <div class="label" id="schoolText"></div>
        <div class="bar-container">
            <div class="bar" id="schoolBar"></div>
        </div>
    </div>

    <!-- Tagesende -->
    <div class="section">
        <div class="label" id="dayText"></div>
        <div class="bar-container">
            <div class="bar" id="dayBar"></div>
        </div>
    </div>
</div>

<script>

// Stundenwechsel
const wechselZeiten = [
    "07:55",
    "08:40",
    "09:25",
    "9:45",
    "10:30",
    "11:15",
    "11:35",
    "12:20",
    "13:05"
];

function toToday(timeStr) {
    const now = new Date();
    const [h, m] = timeStr.split(":");
    const d = new Date(now);
    d.setHours(parseInt(h), parseInt(m), 0, 0);
    return d;
}

function update() {
    const now = new Date();

    updateStundenwechsel(now);
    updateTagesende(now);
}

// Stundenwechsel-Logik
function updateStundenwechsel(now) {
    const text = document.getElementById("schoolText");
    const bar = document.getElementById("schoolBar");

    const times = wechselZeiten.map(t => toToday(t));

    let previous = null;
    let next = null;

    for (let i = 0; i < times.length; i++) {
        if (times[i] > now) {
            next = times[i];
            previous = times[i - 1] || null;
            break;
        }
    }

    if (!next) {
        text.textContent = "Heute kein weiterer Stundenwechsel";
        bar.style.width = "0%";
        return;
    }

    if (!previous) {
        const remaining = next - now;
        const min = Math.floor(remaining / 60000);
        const sec = Math.floor((remaining % 60000) / 1000);

        text.textContent =
            "Erster Stundenwechsel in " +
            min + " Minuten und " + sec + " Sekunden";

        bar.style.width = "0%";
        return;
    }

    const total = next - previous;
    const passed = now - previous;
    const remaining = next - now;

    bar.style.width = (passed / total) * 100 + "%";

    const min = Math.floor(remaining / 60000);
    const sec = Math.floor((remaining % 60000) / 1000);

    text.textContent =
        "Nächster Stundenwechsel in " +
        min + " Minuten und " + sec + " Sekunden";
}

// Tagesende-Logik
function updateTagesende(now) {
    const text = document.getElementById("dayText");
    const bar = document.getElementById("dayBar");

    const endOfDay = new Date(now);
    endOfDay.setHours(24, 0, 0, 0);

    const startOfDay = new Date(now);
    startOfDay.setHours(0, 0, 0, 0);

    const total = endOfDay - startOfDay;
    const passed = now - startOfDay;
    const remaining = endOfDay - now;

    bar.style.width = (passed / total) * 100 + "%";

    const hoursLeft = Math.floor(remaining / (1000 * 60 * 60));
    const minutesLeft = Math.floor((remaining % (1000 * 60 * 60)) / (1000 * 60));

    text.textContent =
        "Tagesende in " +
        hoursLeft + " Stunden und " +
        minutesLeft + " Minuten";
}

setInterval(update, 100);
update();

</script>

</body>
</html>
